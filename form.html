<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/form.css" />
    <title>Form</title>
  </head>
  <body>
    <a class="return" href="./index.html">Back to main page</a>
    <h1>Order form</h1>
    <form>
      <div class="container-form">
      <fieldset class="main">
        <legend>Personal info</legend>
        <div class="formBlock">
          <label
            >First Name:
            <input type="text" id="firstName" name="firstName" required />
          </label>
        </div>
        <div class="formBlock">
          <label
            >Last Name:
            <input type="text" id="lastName" name="lastName" required />
          </label>
        </div>
        <div class="formBlock">
          <label
            >Birthday:
            <input
              type="date"
              id="birthday"
              name="birthday"
              max="2007-03-09"
              min="1926-03-09"
              required
            />
          </label>
        </div>
        <div class="formBlock">
          <p>Gender:</p>
          <label
            ><input type="radio" name="gender" value="female" /> Female</label
          >
          <label><input type="radio" name="gender" value="male" /> Male</label>
        </div>
        <div class="formBlock">
          <label
            >Drive experience:<select class="kategory" name="kategory">
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>
          </label>
        </div>
      </fieldset>
      <fieldset class="main">
        <legend>Contacts</legend>
        <div class="formBlock">
          <label>Email:<input type="email" name="email" required /></label>
        </div>
        <div class="formBlock">
          <label
            >Phone:
            <input
              type="tel"
              name="phone"
              value="+380"
              placeholder="+380 XX XXX XX XX"
              required
            />
          </label>
        </div>
        <div class="formBlock">
          <label class="lablekAddress" for="story">Address</label>
          <textarea id="story" name="story" rows="5" cols="33"> </textarea>
        </div>
      </fieldset>
      <fieldset class="main">
        <legend>Car info</legend>
        <div class="formBlock">
          <label
            >Brand:<select class="kategory" name="kategory">
              <option value="BMW">BMW</option>
              <option value="Toyota">Toyota</option>
              <option value="Ford">Ford</option>
            </select>
          </label>
        </div>
        <div class="formBlock">
          <label
            >Model:<select class="kategory" name="kategory">
              <option value="BMW 3 Series">BMW 3 Series</option>
              <option value="BMW 5 Series">BMW 5 Series</option>
              <option value="Ford Mustang">Ford Mustang</option>
              <option value="Ford F-150">Ford F-150</option>
              <option value="Toyota Camry">Toyota Camry</option>
              <option value="Toyota RAV4">Toyota RAV4</option>
            </select>
          </label>
        </div>
        <div class="formBlock">
          <label>Used:<input class="check" type="checkbox" /></label>
        </div>
        <div class="formBlock">
          <p>Color:</p>
          <lable>Red:<input name="color" type="radio" value="red" /></lable>
          <lable>Black:<input name="color" type="radio" value="black" /></lable>
          <lable>White:<input name="color" type="radio" value="white" /></lable>
          <lable>Blue:<input name="color" type="radio" value="blue" /></lable>
          <lable>Grey:<input name="color" type="radio" value="grey" /></lable>
        </div>
        <div class="formBlock">
          <label
            >Price:
            <input
              class="inputPrice"
              type="range"
              min="10"
              max="100"
              step="10"
              id="priceRange"
              oninput="priceOutput.value = this.value + '.000'"
            />
          </label>
          <div class="range-labels">
            <span>10k</span>
            <span>20k</span>
            <span>30k</span>
            <span>40k</span>
            <span>50k</span>
            <span>60k</span>
            <span>70k</span>
            <span>80k</span>
            <span>90k</span>
            <span>100k</span>
          </div>
        </div>
      </fieldset>
      </div>
      <div class="formButtons">
        <button type="submit">OK</button>
        <button type="reset">Cancel</button>
      </div>
    </form>
  </body>
</html>
