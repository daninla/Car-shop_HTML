<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/form.css" />
    <title>Form</title>
  </head>
  <body>
    <a class="return" href="./index.html">Back to main page</a>
    <h1>Order form</h1>
    <form>
      <div class="container-form">
        <fieldset class="main">
          <legend>Personal info</legend>
          <div class="form-block">
            <label for="first-name">First Name:</label>
            <input type="text" id="first-name" name="first-name" required />
          </div>
          <div class="form-block">
            <label for="last-name">Last Name:</label>
            <input type="text" id="last-name" name="last-name" required />
          </div>
          <div class="form-block">
            <label for="birthday">Birthday:</label>
            <input
              type="date"
              id="birthday"
              name="birthday"
              max="2007-03-09"
              min="1926-03-09"
              required
            />
          </div>
          <div class="form-block">
            <p>Gender:</p>
            <div class="radio-group">
              <input
                type="radio"
                id="gender-female"
                name="gender"
                value="female"
              />
              <label for="gender-female">Female</label>
            </div>
            <div class="radio-group">
              <input type="radio" id="gender-male" name="gender" value="male" />
              <label for="gender-male">Male</label>
            </div>
          </div>
          <div class="form-block">
            <label for="experience">Drive experience:</label>
            <select class="category" id="experience" name="experience">
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>
          </div>
        </fieldset>
        <fieldset class="main">
          <legend>Contacts</legend>
          <div class="form-block">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="form-block">
            <label for="phone">Phone:</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              value="+380"
              placeholder="+380 XX XXX XX XX"
              required
            />
          </div>
          <div class="form-block">
            <label class="label-address" for="story">Address</label>
            <textarea id="story" name="story" rows="3" cols="27"></textarea>
          </div>
        </fieldset>
        <fieldset class="main">
          <legend>Car info</legend>
          <div class="form-block">
            <label for="brand">Brand:</label>
            <select class="category" id="brand" name="brand">
              <option value="BMW">BMW</option>
              <option value="Toyota">Toyota</option>
              <option value="Ford">Ford</option>
            </select>
          </div>
          <div class="form-block">
            <label for="model">Model:</label>
            <select class="category" id="model" name="model">
              <option value="BMW 3 Series">BMW 3 Series</option>
              <option value="BMW 5 Series">BMW 5 Series</option>
              <option value="Ford Mustang">Ford Mustang</option>
              <option value="Ford F-150">Ford F-150</option>
              <option value="Toyota Camry">Toyota Camry</option>
              <option value="Toyota RAV4">Toyota RAV4</option>
            </select>
          </div>
          <div class="form-block checkbox">
            <label for="used">Used</label>
            <input class="check" type="checkbox" id="used" name="used" />
          </div>
          <div class="form-block">
            <div class="radio-group">
              <input id="color-red" name="color" type="radio" value="red" />
              <label for="color-red">Red</label>
            </div>
            <div class="radio-group">
              <input id="color-black" name="color" type="radio" value="black" />
              <label for="color-black">Black</label>
            </div>
            <div class="radio-group">
              <input id="color-white" name="color" type="radio" value="white" />
              <label for="color-white">White</label>
            </div>
            <div class="radio-group">
              <input id="color-blue" name="color" type="radio" value="blue" />
              <label for="color-blue">Blue</label>
            </div>
            <div class="radio-group">
              <input id="color-grey" name="color" type="radio" value="grey" />
              <label for="color-grey">Grey</label>
            </div>
          </div>
          <div class="form-block change-price">
            <label for="price-range">Price:</label>
            <input
              class="input-price"
              type="range"
              min="10"
              max="100"
              step="10"
              id="price-range"
              list="data-price"
            />
            <datalist id="data-price">
              <option value="10">10</option>
              <option value="20">20</option>
              <option value="30">30</option>
              <option value="40">40</option>
              <option value="50">50</option>
              <option value="60">60</option>
              <option value="70">70</option>
              <option value="80">80</option>
            </datalist>
          </div>
        </fieldset>
      </div>
      <div class="form-buttons">
        <button type="reset">Cancel</button>
        <button type="submit">OK</button>
      </div>
    </form>
  </body>
</html>
